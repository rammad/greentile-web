<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Events - Green Tile Social Club</title>
    <link rel="stylesheet" href="css/base.css?v=14">
    <link rel="stylesheet" href="css/nav.css?v=5">
    <link rel="stylesheet" href="css/section-calendar.css?v=12">
    <style>body { background-color: transparent; }</style>
</head>
<body>
    <div id="page-curtain"></div>

    <canvas id="gradient-canvas"></canvas>

    <nav class="sticky-nav">
        <div class="nav-left">
            <a href="index.html" class="logo-link">
                <img src="images/graphics/gtsc-logo-1tile.svg" class="nav-logo" alt="Home">
            </a>
        </div>
        <div class="nav-center">
            <a href="events.html" class="type-subRegular1 ui-roll roll-hover">
                <span class="ui-roll-layer ui-roll-visible">PLAY WITH US</span>
                <span class="ui-roll-layer ui-roll-hidden">PLAY WITH US</span>
            </a>
            <a href="about-us.html" class="type-subRegular1 ui-roll roll-hover">
                <span class="ui-roll-layer ui-roll-visible">WORK WITH US</span>
                <span class="ui-roll-layer ui-roll-hidden">WORK WITH US</span>
            </a>
        </div>
        <div class="nav-right">
            <a href="#" class="type-subRegular1 ui-roll roll-hover">
                <span class="ui-roll-layer ui-roll-visible">SAY HI</span>
                <span class="ui-roll-layer ui-roll-hidden">SAY HI</span>
            </a>
        </div>
    </nav>

    <section class="calendar-page" id="cal-page-container" data-colors="#FFFCFA, #b4f8b4, #FFFCFA" data-edge="0">
        
        <div class="calendar-header">
            <h1 class="type-display-hero animate-cascade">
                Spring Calendar 2025
            </h1>

            <div class="calendar-controls">
                <div class="text-mask">
                    <span class="type-subRegular1 text-reveal-inner">Filters</span>
                </div>
            </div>

            <div class="calendar-controls">
                <div class="filters-list">
                    <button class="filter-btn type-subRegular1 ui-roll roll-hover active">
                        <span class="ui-roll-layer ui-roll-visible">All</span>
                        <span class="ui-roll-layer ui-roll-hidden">All</span>
                    </button>
                    <button class="filter-btn type-subRegular1 ui-roll roll-hover">
                        <span class="ui-roll-layer ui-roll-visible">March</span>
                        <span class="ui-roll-layer ui-roll-hidden">March</span>
                    </button>
                    <button class="filter-btn type-subRegular1 ui-roll roll-hover">
                        <span class="ui-roll-layer ui-roll-visible">April</span>
                        <span class="ui-roll-layer ui-roll-hidden">April</span>
                    </button>
                    <button class="filter-btn type-subRegular1 ui-roll roll-hover">
                        <span class="ui-roll-layer ui-roll-visible">May</span>
                        <span class="ui-roll-layer ui-roll-hidden">May</span>
                    </button>
                </div>

                <div class="filters-list">
                    <div class="view-controls">
                        <button class="view-btn type-subRegular1 ui-roll roll-hover active" id="btn-list">
                            <span class="ui-roll-layer ui-roll-visible">List</span>
                            <span class="ui-roll-layer ui-roll-hidden">List</span>
                        </button>
                        <span class="divider">/</span>
                        <button class="view-btn type-subRegular1 ui-roll roll-hover" id="btn-grid">
                            <span class="ui-roll-layer ui-roll-visible">Grid</span>
                            <span class="ui-roll-layer ui-roll-hidden">Grid</span>
                        </button>
                        <span class="divider">/</span>
                        <a href="archives.html" class="filter-btn type-subRegular1 ui-roll roll-hover">
                            <span class="ui-roll-layer ui-roll-visible">Archives</span>
                            <span class="ui-roll-layer ui-roll-hidden">Archives</span>
                        </a>
                    </div>
                </div>
            </div>
        </div>

        <div class="calendar-body">

            <div class="calendar-interface-wrapper">
            
                <div class="calendar-list">
                    <a href="product.html" class="calendar-row" data-img="images/poster1.png" data-title="Intro to Mahjong">
                        <span class="cal-date type-h2">03.07</span><span class="cal-name type-h2">Intro to Mahjong</span>
                    </a>
                    <a href="product.html" class="calendar-row" data-img="images/poster2.png" data-title="Monthly Meetup" data-status="coming-soon">
                        <span class="cal-date type-h2">03.10</span><span class="cal-name type-h2">Monthly Meetup</span>
                    </a>
                    <a href="product.html" class="calendar-row" data-img="images/poster3.png" data-title="Mott Street Girls x GTSC" data-status="sold-out">
                        <span class="cal-date type-h2">03.23</span><span class="cal-name type-h2">Mott Street Girls x GTSC</span>
                    </a>
                    <a href="product.html" class="calendar-row" data-img="images/poster1.png" data-title="Mahjong After Hours">
                        <span class="cal-date type-h2">04.04</span><span class="cal-name type-h2">Mahjong After Hours</span>
                    </a>
                    <a href="product.html" class="calendar-row" data-img="images/poster2.png" data-title="Monthly Meetup">
                        <span class="cal-date type-h2">04.14</span><span class="cal-name type-h2">Monthly Meetup</span>
                    </a>
                    <a href="product.html" class="calendar-row" data-img="images/poster3.png" data-title="Spring Mahjong Supperclub">
                        <span class="cal-date type-h2">05.02</span><span class="cal-name type-h2">Spring Mahjong Supperclub</span>
                    </a>
                    <a href="product.html" class="calendar-row" data-img="images/poster1.png" data-title="Mahjong After Hours">
                        <span class="cal-date type-h2">05.05</span><span class="cal-name type-h2">Mahjong After Hours</span>
                    </a>
                </div>

                <div class="calendar-poster-wrapper" id="poster-wrapper">
                    <img src="" alt="Event Poster" class="calendar-poster-img" id="poster-img">
                    <div class="status-badge badge-soon" id="status-soon"></div>
                    <div class="status-badge badge-sold" id="status-sold"></div>
                </div>

            </div>

            <div id="dynamic-grid-container" class="calendar-grid-packed"></div>
        </div>

    </section>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script src="scripts/global.js?v=12" defer></script>
    <script src="scripts/background-gradient.js?v=4" defer></script>
    <script src="scripts/section-calendar.js?v=7"></script>

</body>
</html>
