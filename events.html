<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Events - Green Tile Social Club</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <nav class="sticky-nav standard-margins">
        <div class="nav-left"><img src="images/logo-edit.png" class="nav-logo"></div>
        <div class="nav-center">
            <a href="events.html" class="type-sub2 ui-roll roll-hover" style="border-bottom: 2px solid currentColor;">
                <span class="ui-roll-layer ui-roll-visible">Events</span>
                <span class="ui-roll-layer ui-roll-hidden">Events</span>
            </a>
            <a href="#" class="type-sub2 ui-roll roll-hover">
                <span class="ui-roll-layer ui-roll-visible">Shop</span>
                <span class="ui-roll-layer ui-roll-hidden">Shop</span>
            </a>
            <a href="about-us.html" class="type-sub2 ui-roll roll-hover">
                <span class="ui-roll-layer ui-roll-visible">About</span>
                <span class="ui-roll-layer ui-roll-hidden">About</span>
            </a>
        </div>
        <div class="nav-right">
            <a href="#" class="type-sub2 ui-roll roll-hover">
                <span class="ui-roll-layer ui-roll-visible">Contact</span>
                <span class="ui-roll-layer ui-roll-hidden">Contact</span>
            </a>
        </div>
    </nav>

    <div class="calendar-page" id="cal-page-container">
        
        <div class="calendar-header">
            <h1 class="type-display-hero animate-cascade">
                Spring Calendar 2025
            </h1>

            <div class="calendar-controls">
                <div style="display: flex; align-items: center;">
                    
                    <div class="filters-list">
                        <button class="filter-btn type-sub2 ui-roll roll-hover active">
                            <span class="ui-roll-layer ui-roll-visible">All</span>
                            <span class="ui-roll-layer ui-roll-hidden">All</span>
                        </button>
                        <button class="filter-btn type-sub2 ui-roll roll-hover">
                            <span class="ui-roll-layer ui-roll-visible">March</span>
                            <span class="ui-roll-layer ui-roll-hidden">March</span>
                        </button>
                        <button class="filter-btn type-sub2 ui-roll roll-hover">
                            <span class="ui-roll-layer ui-roll-visible">April</span>
                            <span class="ui-roll-layer ui-roll-hidden">April</span>
                        </button>
                        <button class="filter-btn type-sub2 ui-roll roll-hover">
                            <span class="ui-roll-layer ui-roll-visible">May</span>
                            <span class="ui-roll-layer ui-roll-hidden">May</span>
                        </button>
                    </div>
                    
                    <div class="view-controls">
                        <button class="view-btn type-sub2 ui-roll roll-hover active" id="btn-list">
                            <span class="ui-roll-layer ui-roll-visible">List</span>
                            <span class="ui-roll-layer ui-roll-hidden">List</span>
                        </button>
                        <span style="color: var(--color-placeholder); font-size: 14px; margin: 0 8px;">/</span>
                        <button class="view-btn type-sub2 ui-roll roll-hover" id="btn-grid">
                            <span class="ui-roll-layer ui-roll-visible">Grid</span>
                            <span class="ui-roll-layer ui-roll-hidden">Grid</span>
                        </button>
                    </div>
                </div>

                <div class="archive-link">
                    <button class="filter-btn type-sub2 ui-roll roll-hover">
                        <span class="ui-roll-layer ui-roll-visible">Archives</span>
                        <span class="ui-roll-layer ui-roll-hidden">Archives</span>
                    </button>
                </div>
            </div>
        </div>

        <div class="calendar-list">
            <div class="calendar-row" data-img="images/poster1.png" data-title="Intro to Mahjong">
                <span class="cal-date type-h2">03.07</span><span class="cal-name type-h2">Intro to Mahjong</span>
            </div>
            <div class="calendar-row" data-img="images/poster2.png" data-title="Monthly Meetup" data-status="coming-soon">
                <span class="cal-date type-h2">03.10</span><span class="cal-name type-h2">Monthly Meetup</span>
            </div>
            <div class="calendar-row" data-img="images/poster3.png" data-title="Mott Street Girls x GTSC" data-status="sold-out">
                <span class="cal-date type-h2">03.23</span><span class="cal-name type-h2">Mott Street Girls x GTSC</span>
            </div>
            <div class="calendar-row" data-img="images/poster1.png" data-title="Mahjong After Hours">
                <span class="cal-date type-h2">04.04</span><span class="cal-name type-h2">Mahjong After Hours</span>
            </div>
            <div class="calendar-row" data-img="images/poster2.png" data-title="Monthly Meetup">
                <span class="cal-date type-h2">04.14</span><span class="cal-name type-h2">Monthly Meetup</span>
            </div>
            <div class="calendar-row" data-img="images/poster3.png" data-title="Spring Mahjong Supperclub">
                <span class="cal-date type-h2">05.02</span><span class="cal-name type-h2">Spring Mahjong Supperclub</span>
            </div>
            <div class="calendar-row" data-img="images/poster1.png" data-title="Mahjong After Hours">
                <span class="cal-date type-h2">05.05</span><span class="cal-name type-h2">Mahjong After Hours</span>
            </div>
            <div class="calendar-row" data-img="images/poster2.png" data-title="Monthly Meetup">
                <span class="cal-date type-h2">05.18</span><span class="cal-name type-h2">Monthly Meetup</span>
            </div>
        </div>

        <div class="calendar-grid">
            <a href="event-detail.html" class="grid-item"><img src="images/poster1.png" class="grid-poster"></a>
            <a href="#" class="grid-item">
                <div class="status-badge badge-soon"></div>
            </a>

            <a href="event-detail.html" class="grid-item">
                <img src="images/poster3.png" class="grid-poster">
                <div class="status-badge badge-sold"></div>
            </a>
            <a href="event-detail.html" class="grid-item"><img src="images/poster1.png" class="grid-poster"></a>
            <a href="event-detail.html" class="grid-item"><img src="images/poster2.png" class="grid-poster"></a>
            <a href="event-detail.html" class="grid-item"><img src="images/poster3.png" class="grid-poster"></a>
        </div>

        <div class="calendar-poster-wrapper" id="poster-wrapper">
            <img src="" alt="Event Poster" class="calendar-poster-img" id="poster-img">
            <div class="status-badge badge-soon" id="status-soon"></div>
            <div class="status-badge badge-sold" id="status-sold"></div>
        </div>

        <div class="mobile-event-display" id="mobile-display">
            <img src="" class="mobile-poster" id="mobile-poster-img">
            <div class="mobile-title" id="mobile-title-text">Event Name</div>
        </div>

    </div>

    <script src="scripts/global.js"></script>
    <script src="scripts/section-calendar.js"></script>

</body>
</html>
