<!DOCTYPE html>

<head>

        body { background-color: transparent; }
    </style>
</head>
<body>
    <div id="page-curtain"></div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <canvas id="gradient-canvas"></canvas>

    <nav class="sticky-nav nav-subpage">
        <div class="nav-left">
            <a href="events.html" class="nav-back-link type-subRegular1 ui-roll roll-hover">
                <span class="ui-roll-layer ui-roll-visible">BACK</span>
                <span class="ui-roll-layer ui-roll-hidden">BACK</span>
            </a>
        </div>
        <div class="nav-right">
            <a href="#contact" class="type-subRegular1 ui-roll roll-hover">
                <span class="ui-roll-layer ui-roll-visible">SAY HI</span>
                <span class="ui-roll-layer ui-roll-hidden">SAY HI</span>
            </a>
        </div>
        <button class="nav-hamburger" aria-label="Menu" aria-expanded="false">
            <span class="hamburger-line"></span>

    <div class="mobile-menu">
        <div class="mobile-menu-inner">
            <div class="type-subBold1 mobile-menu-subhead">menu</div>

            <a href="#contact" class="type-h2 mobile-menu-link animate-cascade">Say Hi</a>
        </div>
    </div>

    <div class="contact-panel" data-lenis-prevent>
        <div class="contact-panel-inner">
            <div class="contact-panel-header">
                <h2 class="contact-title type-display-hero">SAY HELLO!</h2>
                <button type="button" class="contact-close" aria-label="Close">
                    <span class="contact-close-line" aria-hidden="true"></span>
                    <span class="contact-close-line" aria-hidden="true"></span>
                </button>
            </div>
            <form class="contact-form" id="contact-form">
                <div class="contact-section">
                    <label class="type-subRegular1 contact-label">What is your question about?</label>
                    <div class="contact-topics">
                        <button type="button" class="contact-topic-btn cta-btn is-visible type-subRegular1 active" data-topic="general">General Inquiry</button>
                        <button type="button" class="contact-topic-btn cta-btn is-visible type-subRegular1" data-topic="collaboration">Collaboration</button>
                        <button type="button" class="contact-topic-btn cta-btn is-visible type-subRegular1" data-topic="sponsorship">Sponsorship</button>
                    </div>
                </div>
                <div class="contact-section">
                    <label class="type-subRegular1 contact-label">Your Information</label>
                    <div class="contact-fields-row">
                        <input type="text" class="contact-input type-subRegular1" name="name" placeholder="NAME" required>
                        <input type="email" class="contact-input type-subRegular1" name="email" placeholder="EMAIL" required>
                    </div>
                    <textarea class="contact-textarea type-subRegular1" name="message" placeholder="WRITE YOUR MESSAGE HERE" required></textarea>
                </div>
                <div class="contact-submit-row">
                    <button type="submit" class="contact-submit cta-btn is-visible">
                        <div class="ui-roll roll-hover">
                            <span class="type-subRegular1 ui-roll-layer ui-roll-visible">Send Message</span>
                            <span class="type-subRegular1 ui-roll-layer ui-roll-hidden">Send Message</span>
                        </div>
                    </button>
                    <span class="contact-status type-subRegular1"></span>
                </div>
            </form>
        </div>
    </div>
    <div class="contact-backdrop"></div>

    <section class="archives-page" data-colors="#FFFCFA, #D6FED6, #FFFCFA" data-edge="0">
        <div class="archives-header desktop-only">
            <h1 class="archives-title animate-cascade">Event Archives</h1>
        </div>
        <div class="archives-title-mobile mobile-only">
            <div class="type-display-hero fit-text" data-fit-managed>Event</div>
            <div class="type-display-hero fit-text" data-fit-managed>Archives</div>
        </div>

        <div id="dynamic-archive-container">
            <a href="#" class="archive-cell" data-month="March 2025"><img src="images/poster1.png" class="archive-poster" loading="lazy"></a>
            <a href="#" class="archive-cell" data-month="March 2025"><img src="images/poster2.png" class="archive-poster" loading="lazy"></a>
            <a href="#" class="archive-cell" data-month="April 2025"><img src="images/poster1.png" class="archive-poster" loading="lazy"></a>
            <a href="#" class="archive-cell" data-month="April 2025"><img src="images/poster2.png" class="archive-poster" loading="lazy"></a>
            <a href="#" class="archive-cell" data-month="April 2025"><img src="images/poster3.png" class="archive-poster" loading="lazy"></a>
            <a href="#" class="archive-cell" data-month="May 2025"><img src="images/poster1.png" class="archive-poster" loading="lazy"></a>
            <a href="#" class="archive-cell" data-month="May 2025"><img src="images/poster2.png" class="archive-poster" loading="lazy"></a>
            <a href="#" class="archive-cell" data-month="May 2025"><img src="images/poster3.png" class="archive-poster" loading="lazy"></a>
            <a href="#" class="archive-cell" data-month="May 2025"><img src="images/poster1.png" class="archive-poster" loading="lazy"></a>
            <a href="#" class="archive-cell" data-month="May 2025"><img src="images/poster2.png" class="archive-poster" loading="lazy"></a>
            </div>

        <div class="archives-coming-soon"><span class="type-h2">more events coming soon!</span></div>

        <div class="load-more-container">
            <button id="btn-load-more" class="cta-btn">
                <div class="ui-roll roll-hover ">
                    <span class="type-subRegular1 ui-roll-layer ui-roll-visible">
                        <span>$25</span><span>&ndash;</span><span>Buy Now</span>
                    </span>
                    <span class="type-subRegular1 ui-roll-layer ui-roll-hidden">
                        <span>$25</span><span>&ndash;</span><span>Buy Now</span>
                    </span>
                </div>
            </button>
        </div>
        
    </section>

    <script src="scripts/global.js?v=21"></script>
    <script src="scripts/background-gradient.js?v=15"></script>
    <script src="scripts/section-archives.js?v=16"></script>
    <script src="scripts/contact.js?v=11"></script>
</body>
</html>
